    - '\bagentic\b'
    - '\bllm[\-\s]?agent\b'
    - '\bautonomous[\-\s]?agent\b'
    - '\btool[\-\s]?use\b'
    - '\btool[\-\s]?using\b'
    - '\bagent[\-\s]?framework\b'
    - '\breact\b'
    - '\bchain[\-\s]?of[\-\s]?thought[\-\s]?agent\b'
    - '\bagent[\-\s]?collaborat\w*\b'
    - '\bagent[\-\s]?orchestrat\w*\b'
    - '\bmulti[\-\s]?agent[\-\s]?system\b'
    - '\bagent[\-\s]?based\b'
    - '\bllm[\-\s]?based[\-\s]?agent\b'
    - '\breinforcement[\-\s]?learning[\-\s]?agent\b'
    - '\bagent[\-\s]?planning\b'
    - '\bagent[\-\s]?reasoning\b'
