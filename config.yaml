    - '\bfinance\b'
    - '\baccounting\b'
    - '\bfraud[\-\s]?detect\w*\b'
    - '\bcompliance\b'
    - '\brisk[\-\s]?assess\w*\b'
    - '\binternal[\-\s]?control\b'
    - '\bassurance\b'
    - '\bforensic[\-\s]?account\w*\b'
    - '\bsox\b'
    - '\bsarbanes[\-\s]?oxley\b'
    - '\bregulat\w*\b'
    - '\banti[\-\s]?money[\-\s]?launder\w*\b'
    - '\baml\b'
    - '\bfinancial[\-\s]?report\w*\b'
    - '\bfinancial[\-\s]?statement\b'
    - '\btax\b'
    - '\btaxation\b'
    - '\bpharmaceut\w*\b'
    - '\bdrug[\-\s]?discover\w*\b'
    - '\bclinical[\-\s]?trial\w*\b'
    - '\bpharmacolog\w*\b'
    - '\bmedical\b'
    - '\bhealthcare\b'
    - '\bhealth[\-\s]?care\b'
    - '\bbiomedic\w*\b'
    - '\bdrug[\-\s]?design\b'
    - '\bmolecul\w*\b'
    - '\bprotein\b'
    - '\bdiagnos\w*\b'
    - '\bpatient\b'
    - '\behr\b'
    - '\belectronic[\-\s]?health[\-\s]?record\b'
    - '\bdrug[\-\s]?repurpos\w*\b'
    - '\bdrug[\-\s]?development\b'
    - '\bclinical\b'
    - '\bpatholog\w*\b'
    - '\bradiol\w*\b'
    - '\boncolog\w*\b'
    - '\bgenomi\w*\b'
